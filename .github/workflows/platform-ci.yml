name: Music Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  app-ci:
    name: App - Test, Build, Scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run Checkstyle
        run: ./mvnw checkstyle:check

      - name: Run tests and coverage
        run: ./mvnw clean verify

      - name: Build Docker image
        run: docker build -t music-app:ci .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: music-app:ci
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  k8s-ci:
    name: Kubernetes - Helm validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint k8s/music-chart

      - name: Helm template
        run: helm template music-release k8s/music-chart

  infra-ci:
    name: Infra - Terraform validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform-music

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
