name: Music Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Application CI: Test, Build and Push Image
  app-ci:
    name: App - Test, Build, Scan, and Push
    runs-on: ubuntu-latest
    # ... (services et steps inchangés)

  # Infrastructure CI: Terraform Provisioning
  infra-ci:
    name: Infra - Terraform validation
    needs: app-ci
    runs-on: ubuntu-latest
    outputs:
      ec2_public_ip: ${{ steps.get_ip.outputs.ip }}
    
    defaults:
      run:
        working-directory: infra/terraform-music
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: terraform apply -auto-approve

      # Temporary step to verify outputs
      - name: Show Terraform outputs
        working-directory: infra/terraform-music
        run: terraform output

      - name: Export EC2 IP
        id: get_ip
        run: echo "ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

  # Configuration Management: Ansible Playbook Execution
  ansible:
    name: Configure EC2 with Ansible
    needs: infra-ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ec2-key.pem
          chmod 600 ec2-key.pem

      # Debug step to verify IP transmission
      - name: Debug EC2 IP from Terraform
        run: echo "EC2 IP = ${{ needs.infra-ci.outputs.ec2_public_ip }}"

      - name: Create dynamic inventory
        run: |
          cat > infra/ansible/inventory.ini <<EOF
          [music_app_server]
          ec2-instance ansible_host=${{ needs.infra-ci.outputs.ec2_public_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=../../ec2-key.pem
          EOF

      - name: Run Ansible Playbook
        working-directory: infra/ansible
        run: ansible-playbook -i inventory.ini playbook.yml

  # Kubernetes CI: Helm Charts Validation
  k8s-ci:
    name: Kubernetes - Helm validation
    needs: ansible
    runs-on: ubuntu-latest
    # ... (steps Helm inchangés)
