name: Music Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Application CI: Test, Build and Push Image
  app-ci:
    name: App - Test, Build, Scan, and Push
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: jojo
          MYSQL_DATABASE: movie_app
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pjojo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run Checkstyle
        run: ./mvnw checkstyle:check

      - name: Run Tests + Coverage
        run: ./mvnw clean verify

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: app/target/site/jacoco/

      - name: Build Docker image
        run: docker build -t music-app:ci .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: music-app:ci
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      - name: Push Docker image to GHCR
        run: |
          docker tag music-app:ci ${{ vars.GHCR_IMAGE }}
          docker push ${{ vars.GHCR_IMAGE }}

  # Infrastructure CI: Terraform Provisioning
  infra-ci:
    name: Infra - Terraform validation
    needs: app-ci
    runs-on: ubuntu-latest
    outputs:
      ec2_public_ip: ${{ steps.get_ip.outputs.ip }}
    
    defaults:
      run:
        working-directory: infra/terraform-music
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: terraform apply -auto-approve

      - name: Show Terraform outputs
        run: terraform output

      - name: Export EC2 IP
        id: get_ip
        run: echo "ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

  # Configuration Management: Ansible Playbook Execution
  ansible:
    name: Configure EC2 with Ansible
    needs: [infra-ci]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ec2-key.pem
          chmod 600 ec2-key.pem

      - name: Debug EC2 IP from Terraform
        run: echo "EC2 IP = ${{ needs.infra-ci.outputs.ec2_public_ip }}"

      - name: Create dynamic inventory
        run: |
          cat > infra/ansible/inventory.ini <<EOF
          [music_app_server]
          ec2-instance ansible_host=${{ needs.infra-ci.outputs.ec2_public_ip }} ansible_user=ec2-user ansible_ssh_private_key_file=../../ec2-key.pem
          EOF

      - name: Wait for EC2 SSH to be ready
        run: sleep 60

      - name: Run Ansible Playbook
        working-directory: infra/ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: ansible-playbook -i inventory.ini playbook.yml

      # ✅ New step: Extract and prepare kubeconfig for GitHub runner
      - name: Fetch kubeconfig from EC2
        run: |
          ssh -i ec2-key.pem -o StrictHostKeyChecking=no ec2-user@${{ needs.infra-ci.outputs.ec2_public_ip }} "sudo cat /etc/rancher/k3s/k3s.yaml" > k3s-config.tmp
          sed "s/127.0.0.1/${{ needs.infra-ci.outputs.ec2_public_ip }}/g" k3s-config.tmp > k3s-config.yaml

      # ✅ New step: Store kubeconfig to share it with the next job
      - name: Upload kubeconfig as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig
          path: k3s-config.yaml

  # Kubernetes CI: Helm Deployment
  k8s-ci:
    name: Kubernetes - Helm deployment
    needs: [infra-ci, ansible]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download kubeconfig
        uses: actions/download-artifact@v4
        with:
          name: kubeconfig

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint k8s/music-chart

      # ✅ Actual deployment using the fetched kubeconfig
      - name: Deploy with Helm
        env:
          KUBECONFIG: ./k3s-config.yaml
        run: |
          helm upgrade --install music-release k8s/music-chart \
            --set image.repository=${{ vars.GHCR_IMAGE }} \
            --set image.tag=latest \
            --wait --timeout 5m

