name: Music Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  app-ci:
    name: App - Test, Build, Scan, and Push
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: jojo
          MYSQL_DATABASE: movie_app
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pjojo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # ✅ LINTER
      - name: Run Checkstyle
        run: ./mvnw checkstyle:check

      # ✅ TESTS + COVERAGE
      - name: Run Tests + Coverage
        run: ./mvnw clean verify

      # ✅ UPLOAD COVERAGE
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: app/target/site/jacoco/

      - name: Build Docker image
        run: docker build -t music-app:ci .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: music-app:ci
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      - name: Push Docker image to GHCR
        run: |
          docker tag music-app:ci ${{ vars.GHCR_IMAGE }}
          docker push ${{ vars.GHCR_IMAGE }}

  infra-ci:
    name: Infra - Terraform validation
    needs: app-ci
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: infra/terraform-music
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: terraform apply -auto-approve

  k8s-ci:
    name: Kubernetes - Helm validation
    needs: infra-ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint k8s/music-chart

      - name: Helm template
        run: helm template music-release k8s/music-chart
